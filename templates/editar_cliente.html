{% extends "base.html" %}
{% block titulo %}Editar cliente · Livro de Empréstimos{% endblock %}

{% block conteudo %}
  <div class="eyebrow">Cadastro</div>
  <h1>Editar cliente</h1>

  <form class="ficha" method="POST">
    <div class="campo">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" name="nome" value="{{ cliente.nome }}" required autofocus>
    </div>
    <div class="campo">
      <label for="cpf">CPF</label>
      <input type="text" id="cpf" name="cpf" value="{{ cliente.cpf }}" required>
    </div>
    <div class="linha-dupla">
      <div class="campo">
        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" name="telefone" value="{{ cliente.telefone }}">
      </div>
      <div class="campo">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ cliente.email }}">
      </div>
    </div>
    <button type="submit" class="botao">Salvar alterações</button>
    <a href="{{ url_for('listar_clientes') }}" class="botao secundario">Cancelar</a>
  </form>
{% endblock %}
