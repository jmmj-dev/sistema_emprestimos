{% extends "base.html" %}
{% block titulo %}Novo cliente · Livro de Empréstimos{% endblock %}

{% block conteudo %}
  <div class="eyebrow">Cadastro</div>
  <h1>Novo cliente</h1>
  <p class="subtitulo">Dados de quem vai receber o empréstimo.</p>

  <form class="ficha" method="POST">
    <div class="campo">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" name="nome" required autofocus>
    </div>
    <div class="campo">
      <label for="cpf">CPF</label>
      <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
    </div>
    <div class="linha-dupla">
      <div class="campo">
        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" name="telefone" placeholder="(31) 99999-0000">
      </div>
      <div class="campo">
        <label for="email">Email</label>
        <input type="email" id="email" name="email">
      </div>
    </div>
    <button type="submit" class="botao">Salvar cliente</button>
  </form>
{% endblock %}
